<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Para ti 🌻">
<meta property="og:description" content="Algo especial te espera aquí, mi bonita">
<meta property="og:url" content="https://jonathan-elian.github.io/FA/">
<meta property="og:type" content="website">
<title>Para Joss 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c518;
    --amber: #ffb703;
    --deep-amber: #e08600;
    --petal: #ffe55c;
    --cream: #fff8e1;
    --bg: #0d0600;
    --card-bg: #180c00;
    --green: #2d6a4f;
    --stem: #40916c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 40%, rgba(245,197,24,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 70%, rgba(255,183,3,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── CONTADOR ── */
  .counter {
    position: fixed;
    top: 22px; right: 24px;
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(245,197,24,0.08);
    border: 1px solid rgba(245,197,24,0.2);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 0.75rem;
    color: rgba(255,248,225,0.6);
    letter-spacing: 0.06em;
    z-index: 100;
    transition: all 0.3s ease;
  }
  .counter span { color: var(--gold); font-weight: 500; font-size: 0.9rem; }
  .counter.bump { transform: scale(1.15); color: var(--gold); }

  /* ── LLUVIA DE FLORES ── */
  .rain-flower {
    position: fixed;
    pointer-events: none;
    font-size: 1.4rem;
    z-index: 200;
    animation: rainFall 1.8s ease-in forwards;
  }
  @keyframes rainFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    80%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(180px) rotate(360deg) scale(0.5); }
  }

  /* ── TARJETA ── */
  .card {
    position: relative;
    z-index: 10;
    width: min(500px, 93vw);
    background: linear-gradient(155deg, #1e0e00 0%, #110700 100%);
    border: 1px solid rgba(245,197,24,0.18);
    border-radius: 28px;
    padding: 50px 42px 46px;
    text-align: center;
    box-shadow:
      0 0 80px rgba(245,197,24,0.1),
      0 24px 70px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,229,92,0.12);
    animation: cardIn 1s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(50px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card::after {
    content: '';
    position: absolute;
    top: -1px; right: -1px;
    width: 90px; height: 90px;
    background: radial-gradient(circle at top right, rgba(255,229,92,0.14), transparent 70%);
    border-radius: 0 28px 0 0;
    pointer-events: none;
  }

  /* ── FLOR SVG ── */
  .flower-container {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
    animation: flowerAppear 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }
  @keyframes flowerAppear {
    from { opacity: 0; transform: scale(0.2) rotate(-30deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .flower-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    position: relative;
    filter: drop-shadow(0 0 20px rgba(255,183,3,0.45));
    transition: filter 0.3s ease;
  }
  .flower-btn:hover {
    filter: drop-shadow(0 0 32px rgba(255,229,92,0.7));
  }
  .flower-btn:active { transform: scale(0.96); }

  .flower-svg {
    width: 140px;
    height: 168px;
    animation: sway 5s ease-in-out infinite;
    transform-origin: 70px 155px;
  }
  @keyframes sway {
    0%,100% { transform: rotate(-2.5deg); }
    50%      { transform: rotate(2.5deg); }
  }

  .petals-group {
    transform-origin: 70px 72px;
    transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .flower-btn.bloomed .petals-group {
    transform: scale(1.18);
  }
  .flower-btn.bloomed .flower-svg {
    filter: brightness(1.15);
  }

  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 1.1rem;
    animation: sparkleOut 0.9s ease-out forwards;
  }
  @keyframes sparkleOut {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  .click-hint {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(245,197,24,0.4);
    text-transform: uppercase;
    margin-top: -18px;
    margin-bottom: 22px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 0.9; }
  }
  .flower-btn.bloomed ~ .click-hint { opacity: 0; transition: opacity 0.5s; }

  /* ── TEXTOS ── */
  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.65;
    margin-bottom: 10px;
    animation: fadeUp 0.8s ease 0.7s both;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5.5vw, 2.1rem);
    font-weight: 600;
    color: var(--petal);
    line-height: 1.2;
    margin-bottom: 20px;
    animation: fadeUp 0.8s ease 0.85s both;
  }
  .headline em {
    font-style: italic;
    color: var(--gold);
  }

  .divider {
    width: 55px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    margin: 0 auto 22px;
    animation: fadeUp 0.8s ease 0.95s both;
  }

  .message-wrap {
    min-height: 100px;
    margin-bottom: 28px;
    animation: fadeUp 0.8s ease 1.05s both;
  }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 3.2vw, 1.12rem);
    color: rgba(255,248,225,0.82);
    line-height: 1.85;
  }
  .message strong {
    color: var(--petal);
    font-style: normal;
    font-weight: 600;
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--gold);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  /* ── BOTÓN RECIBIR ── */
  .receive-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(255,183,3,0.08));
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 99px;
    padding: 11px 26px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.25s ease;
    animation: fadeUp 0.8s ease 1.2s both;
  }
  .receive-btn:hover {
    background: linear-gradient(135deg, rgba(245,197,24,0.25), rgba(255,183,3,0.15));
    box-shadow: 0 0 24px rgba(245,197,24,0.2);
    transform: translateY(-2px);
  }
  .receive-btn:active { transform: translateY(0) scale(0.97); }
  .receive-btn.received {
    color: var(--petal);
    border-color: rgba(255,229,92,0.5);
    background: linear-gradient(135deg, rgba(255,229,92,0.2), rgba(245,197,24,0.12));
  }

  /* ── MUSIC PLAYER ── */
  .music-player {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(13, 6, 0, 0.85);
    border: 1px solid rgba(245,197,24,0.22);
    border-radius: 99px;
    padding: 10px 20px;
    z-index: 100;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), 0 0 20px rgba(245,197,24,0.07);
    animation: fadeUp 1s ease 1.5s both;
    min-width: 220px;
  }

  .music-play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(245,197,24,0.25), rgba(255,183,3,0.12));
    border: 1px solid rgba(245,197,24,0.35);
    color: var(--gold);
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .music-play-btn:hover {
    background: linear-gradient(135deg, rgba(245,197,24,0.4), rgba(255,183,3,0.25));
    box-shadow: 0 0 16px rgba(245,197,24,0.3);
    transform: scale(1.08);
  }
  .music-play-btn:active { transform: scale(0.95); }

  .music-info {
    flex: 1;
    overflow: hidden;
  }

  .music-title {
    font-size: 0.72rem;
    color: rgba(255,248,225,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.03em;
  }

  .music-progress-wrap {
    position: relative;
    height: 3px;
    background: rgba(245,197,24,0.15);
    border-radius: 99px;
    margin-top: 5px;
    cursor: pointer;
    overflow: hidden;
  }
  .music-progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--amber), var(--gold));
    border-radius: 99px;
    transition: width 0.5s linear;
  }

  /* Barras animadas cuando suena */
  .music-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
    flex-shrink: 0;
  }
  .music-bars span {
    width: 3px;
    background: var(--gold);
    border-radius: 2px;
    opacity: 0.5;
    height: 4px;
    transition: height 0.2s ease;
  }
  .music-bars.playing span:nth-child(1) { animation: bar1 0.8s ease-in-out infinite; opacity: 0.9; }
  .music-bars.playing span:nth-child(2) { animation: bar2 0.7s ease-in-out infinite 0.1s; opacity: 0.9; }
  .music-bars.playing span:nth-child(3) { animation: bar3 0.9s ease-in-out infinite 0.05s; opacity: 0.9; }
  @keyframes bar1 { 0%,100%{height:4px} 50%{height:14px} }
  @keyframes bar2 { 0%,100%{height:8px} 50%{height:4px} }
  @keyframes bar3 { 0%,100%{height:12px} 50%{height:6px} }

  /* ── SOUND TOGGLE ── */
  .sound-btn {
    position: fixed;
    bottom: 22px; right: 24px;
    background: rgba(245,197,24,0.08);
    border: 1px solid rgba(245,197,24,0.18);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    color: rgba(255,248,225,0.5);
    transition: all 0.25s;
    z-index: 100;
  }
  .sound-btn:hover { background: rgba(245,197,24,0.16); color: var(--gold); }
  .sound-btn.on { color: var(--gold); border-color: rgba(245,197,24,0.4); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px) translateX(-50%); }
    to   { opacity: 1; transform: translateY(0) translateX(-50%); }
  }

  /* Override fadeUp para elementos que no usan translateX */
  .eyebrow, .headline, .divider, .message-wrap, .receive-btn,
  .counter, .sound-btn {
    animation-name: fadeUpSimple;
  }
  @keyframes fadeUpSimple {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Contador -->
<div class="counter" id="counter">
  🌻 <span id="count">0</span> flores enviadas
</div>

<!-- Sound toggle (efectos) -->
<button class="sound-btn" id="soundBtn" title="Efectos de sonido">🔇</button>

<!-- Tarjeta principal -->
<div class="card" id="card">

  <!-- Flor interactiva -->
  <div class="flower-container">
    <button class="flower-btn" id="flowerBtn" title="¡Haz clic para florecer!">
      <svg class="flower-svg" viewBox="0 0 140 168" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M70 165 Q64 140 67 118 Q70 96 70 80" stroke="#40916c" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M68 122 Q48 113 40 98 Q54 106 68 116Z" fill="#2d6a4f"/>
        <path d="M70 110 Q90 99 98 84 Q84 96 70 106Z" fill="#40916c"/>
        <g class="petals-group">
          <ellipse cx="70" cy="40" rx="11" ry="24" fill="#ffb703" opacity="0.97"/>
          <ellipse cx="70" cy="104" rx="11" ry="24" fill="#f5c518" opacity="0.92"/>
          <ellipse cx="34" cy="72" rx="24" ry="11" fill="#ffb703" opacity="0.94"/>
          <ellipse cx="106" cy="72" rx="24" ry="11" fill="#f5c518" opacity="0.92"/>
          <ellipse cx="45" cy="47" rx="11" ry="24" transform="rotate(-45 45 47)" fill="#ffe55c" opacity="0.88"/>
          <ellipse cx="95" cy="47" rx="11" ry="24" transform="rotate(45 95 47)" fill="#ffe55c" opacity="0.88"/>
          <ellipse cx="45" cy="97" rx="11" ry="24" transform="rotate(45 45 97)" fill="#f5c518" opacity="0.87"/>
          <ellipse cx="95" cy="97" rx="11" ry="24" transform="rotate(-45 95 97)" fill="#ffb703" opacity="0.87"/>
        </g>
        <circle cx="70" cy="72" r="20" fill="#7c3d00"/>
        <circle cx="70" cy="72" r="15" fill="#5c2d00"/>
        <circle cx="65" cy="68" r="2" fill="#ffb703" opacity="0.35"/>
        <circle cx="75" cy="68" r="2" fill="#ffb703" opacity="0.35"/>
        <circle cx="70" cy="63" r="2" fill="#ffb703" opacity="0.35"/>
        <circle cx="70" cy="77" r="2" fill="#ffb703" opacity="0.35"/>
        <circle cx="63" cy="74" r="1.5" fill="#f5c518" opacity="0.3"/>
        <circle cx="77" cy="74" r="1.5" fill="#f5c518" opacity="0.3"/>
        <circle cx="66" cy="79" r="1.5" fill="#f5c518" opacity="0.25"/>
        <circle cx="74" cy="79" r="1.5" fill="#f5c518" opacity="0.25"/>
        <circle cx="63" cy="66" r="4" fill="white" opacity="0.07"/>
      </svg>
    </button>
  </div>

  <p class="click-hint" id="clickHint">✦ toca la flor ✦</p>

  <p class="eyebrow">Para ti · con cariño</p>

  <h1 class="headline">Hoy no serás<br><em>espectadora, Joss</em></h1>

  <div class="divider"></div>

  <div class="message-wrap">
    <p class="message" id="msgText"><span id="typed"></span><span class="cursor" id="cursor"></span></p>
  </div>

  <button class="receive-btn" id="receiveBtn">
    <span id="btnIcon">🌻</span>
    <span id="btnText">Recibir mi flor</span>
  </button>

</div>

<!-- ── MUSIC PLAYER ── -->
<div class="music-player" id="musicPlayer">
  <button class="music-play-btn" id="musicPlayBtn" title="Play / Pause">▶</button>
  <div class="music-info">
    <div class="music-title" id="musicTitle">🎵 tu-cancion.mp3</div>
    <div class="music-progress-wrap" id="progressWrap">
      <div class="music-progress-bar" id="progressBar"></div>
    </div>
  </div>
  <div class="music-bars" id="musicBars">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- ── AUDIO ELEMENT ── -->
<!-- 👇 CAMBIA "tu-cancion.mp3" por el nombre real de tu archivo -->
<audio id="bgMusic" loop>
  <source src="la-mentira.mp3" type="audio/mpeg">
  <source src="la-mentira.mp3" type="audio/ogg">
</audio>

<script>
// ─── ESTADO ───────────────────────────────────────────
let count = parseInt(localStorage.getItem('joss_flores') || '0');
let soundOn = false;
let typingDone = false;
let audioCtx = null;

// ─── CONTADOR ─────────────────────────────────────────
const countEl = document.getElementById('count');
const counterEl = document.getElementById('counter');
countEl.textContent = count;

function bumpCounter() {
  count++;
  localStorage.setItem('joss_flores', count);
  countEl.textContent = count;
  counterEl.classList.add('bump');
  setTimeout(() => counterEl.classList.remove('bump'), 400);
}

// ─── AUDIO EFECTOS (Web Audio API) ───────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playNote(freq, duration, type = 'sine', vol = 0.18) {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playBloom() {
  if (!soundOn) return;
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playNote(f, 0.4, 'sine', 0.14), i * 90));
}
function playClick() {
  playNote(880, 0.15, 'sine', 0.1);
  setTimeout(() => playNote(1100, 0.12, 'sine', 0.08), 80);
}
function playConfetti() {
  if (!soundOn) return;
  [523,587,659,698,784].forEach((f,i) => setTimeout(() => playNote(f, 0.3, 'triangle', 0.12), i*80));
}

// ─── SOUND TOGGLE (efectos) ───────────────────────────
const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  soundBtn.classList.toggle('on', soundOn);
  if (soundOn) { try { getAudioCtx().resume(); } catch(e){} }
});

// ─── MUSIC PLAYER ─────────────────────────────────────
const bgMusic      = document.getElementById('bgMusic');
const musicPlayBtn = document.getElementById('musicPlayBtn');
const progressBar  = document.getElementById('progressBar');
const progressWrap = document.getElementById('progressWrap');
const musicBars    = document.getElementById('musicBars');
const musicTitle   = document.getElementById('musicTitle');

// Muestra el nombre real del archivo en el título
const src = bgMusic.querySelector('source')?.src || '';
const fileName = src.split('/').pop() || 'tu-cancion.mp3';
musicTitle.textContent = '🎵 ' + decodeURIComponent(fileName.replace(/\.[^.]+$/, ''));

let musicPlaying = false;

function toggleMusic() {
  if (musicPlaying) {
    bgMusic.pause();
    musicPlayBtn.textContent = '▶';
    musicBars.classList.remove('playing');
    musicPlaying = false;
  } else {
    bgMusic.play().then(() => {
      musicPlayBtn.textContent = '⏸';
      musicBars.classList.add('playing');
      musicPlaying = true;
    }).catch(() => {
      musicTitle.textContent = '⚠ No se encontró el archivo';
    });
  }
}

musicPlayBtn.addEventListener('click', toggleMusic);

// Barra de progreso
bgMusic.addEventListener('timeupdate', () => {
  if (bgMusic.duration) {
    const pct = (bgMusic.currentTime / bgMusic.duration) * 100;
    progressBar.style.width = pct + '%';
  }
});

// Click en la barra para saltar
progressWrap.addEventListener('click', (e) => {
  const rect = progressWrap.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  if (bgMusic.duration) {
    bgMusic.currentTime = ratio * bgMusic.duration;
  }
});

// Si termina (aunque tiene loop, por si acaso)
bgMusic.addEventListener('ended', () => {
  musicPlayBtn.textContent = '▶';
  musicBars.classList.remove('playing');
  musicPlaying = false;
  progressBar.style.width = '0%';
});

// ─── TYPEWRITER ───────────────────────────────────────
const fullText = 'Aunque no sea presencial,\nhoy te entrego una\n🌻 flor amarilla virtual 🌻\nque lleva todo el cariño\nque no cabe en palabras.';
const typedEl = document.getElementById('typed');
const cursorEl = document.getElementById('cursor');
let charIdx = 0;

function typeChar() {
  if (charIdx < fullText.length) {
    const ch = fullText[charIdx];
    if (ch === '\n') {
      typedEl.innerHTML += '<br>';
    } else if (fullText.slice(charIdx, charIdx+2) === '🌻') {
      typedEl.innerHTML += '🌻';
      charIdx++;
    } else {
      typedEl.innerHTML += ch === ' ' ? '&nbsp;' : ch;
    }
    charIdx++;
    const delay = ch === ',' || ch === '.' ? 280 : ch === '\n' ? 220 : 38 + Math.random() * 28;
    setTimeout(typeChar, delay);
  } else {
    cursorEl.style.display = 'none';
    typingDone = true;
  }
}
setTimeout(typeChar, 1400);

// ─── FLOR FLORECE ─────────────────────────────────────
const flowerBtn = document.getElementById('flowerBtn');
const clickHint = document.getElementById('clickHint');
let bloomed = false;

flowerBtn.addEventListener('click', (e) => {
  if (!bloomed) {
    bloomed = true;
    flowerBtn.classList.add('bloomed');
    clickHint.style.opacity = '0';
    playBloom();
    spawnSparkles(e.currentTarget);
  }
  spawnRain(e.clientX, e.clientY, 5);
});

function spawnSparkles(btn) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const sparks = ['✨','⭐','💛','🌟','✦'];
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = sparks[i % sparks.length];
    const angle = (i / 10) * Math.PI * 2;
    const dist = 50 + Math.random() * 60;
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.position = 'fixed';
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.animationDelay = (Math.random() * 0.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// ─── LLUVIA DE FLORES ─────────────────────────────────
const flowerEmojis = ['🌻','🌼','💛','✨','🌟','⭐','🌸'];
document.body.addEventListener('click', (e) => {
  if (e.target.closest('.flower-btn') || e.target.closest('.receive-btn') ||
      e.target.closest('.sound-btn') || e.target.closest('.music-player')) return;
  spawnRain(e.clientX, e.clientY, 6);
  playClick();
});

function spawnRain(x, y, qty) {
  for (let i = 0; i < qty; i++) {
    const el = document.createElement('div');
    el.className = 'rain-flower';
    el.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
    const offsetX = (Math.random() - 0.5) * 120;
    el.style.left = (x + offsetX) + 'px';
    el.style.top = y + 'px';
    el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
    el.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    el.style.animationDelay = (Math.random() * 0.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

// ─── BOTÓN RECIBIR ────────────────────────────────────
const receiveBtn = document.getElementById('receiveBtn');
const btnIcon = document.getElementById('btnIcon');
const btnText = document.getElementById('btnText');
let received = false;

receiveBtn.addEventListener('click', (e) => {
  if (!received) {
    received = true;
    receiveBtn.classList.add('received');
    btnIcon.textContent = '💛';
    btnText.textContent = '¡Flor recibida, Joss! TQM 🌻';
    bumpCounter();
    playConfetti();
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const rx = Math.random() * window.innerWidth;
        const ry = Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.1;
        spawnRain(rx, ry, 3);
      }, i * 55);
    }
  } else {
    spawnRain(e.clientX, e.clientY, 8);
    playClick();
  }
});
</script>
